# openapi/common/schemas.yaml
# Fragments et schémas partagés réutilisables par toutes les specs du repo
components:
  schemas:

    # Types primitifs enrichis
    UUID:
      type: string
      format: uuid
      description: "Identifiant unique au format UUID v4"
      example: "123e4567-e89b-12d3-a456-426614174000"

    Timestamp:
      type: string
      format: date-time
      description: "Horodatage ISO 8601"
      example: "2026-03-04T14:24:00Z"

    NonEmptyString:
      type: string
      minLength: 1
      description: "Chaîne non vide"
      example: "Jad The Mighty"

    PositiveInteger:
      type: integer
      minimum: 1
      description: "Entier strictement positif"
      example: 3

    # Erreurs standardisées
    ErrorResponse:
      type: object
      required: [ error, message ]
      properties:
        error:
          type: string
          description: "Code d'erreur court"
          example: "ValidationError"
        message:
          type: string
          description: "Message lisible décrivant l'erreur"
          example: "name must be at least 3 characters"
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'
          description: "Détails optionnels pour les erreurs de validation"
      additionalProperties: false

    ValidationErrorDetail:
      type: object
      required: [ field, issue ]
      properties:
        field:
          type: string
          example: "name"
        issue:
          type: string
          example: "minLength"
        message:
          type: string
          example: "must be at least 3 characters"
      additionalProperties: false

    # Pagination / listes
    Page:
      type: object
      required: [ size, number, totalElements, totalPages ]
      properties:
        size:
          $ref: '#/components/schemas/PositiveInteger'
        number:
          type: integer
          minimum: 0
          example: 0
        totalElements:
          type: integer
          minimum: 0
          example: 42
        totalPages:
          type: integer
          minimum: 0
          example: 5
      additionalProperties: false

    PagedResponse:
      type: object
      required: [ page, items ]
      properties:
        page:
          $ref: '#/components/schemas/Page'
        items:
          type: array
          items:
            type: object
          description: "Tableau d'objets; le consumer doit $ref le schéma concret"
      additionalProperties: false
