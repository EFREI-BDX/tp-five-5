openapi: 3.0.3
info:
  title: Manage Field API
  version: 1.0.0
  description: Contrat HTTP pour les terrains, leurs statuts et les reservations.
servers:
  - url: https://api.example.org
    description: Base URL

tags:
  - name: Reference Data
  - name: Terrains
  - name: Reservations

paths:
  /v1/terrain-statuses:
    get:
      tags: [Reference Data]
      summary: Lister les statuts de terrain
      operationId: listTerrainStatuses
      responses:
        '200':
          description: Liste des statuts de terrain
          content:
            application/json:
              schema:
                $ref: './tests/schemas/terrain-status-list.schema.json'

  /v1/reservation-statuses:
    get:
      tags: [Reference Data]
      summary: Lister les statuts de reservation
      operationId: listReservationStatuses
      responses:
        '200':
          description: Liste des statuts de reservation
          content:
            application/json:
              schema:
                $ref: './tests/schemas/reservation-status-list.schema.json'

  /v1/terrains:
    post:
      tags: [Terrains]
      summary: Creer un terrain
      operationId: createTerrain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerrainRequest'
      responses:
        '201':
          description: Terrain cree
          content:
            application/json:
              schema:
                $ref: './tests/schemas/terrain.schema.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/terrains/{terrain_id}:
    parameters:
      - $ref: '#/components/parameters/TerrainIdParam'
    get:
      tags: [Terrains]
      summary: Recuperer un terrain
      operationId: getTerrain
      responses:
        '200':
          description: Terrain
          content:
            application/json:
              schema:
                $ref: './tests/schemas/terrain.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/terrains/{terrain_id}/status:
    parameters:
      - $ref: '#/components/parameters/TerrainIdParam'
    patch:
      tags: [Terrains]
      summary: Changer le statut d'un terrain
      operationId: updateTerrainStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTerrainStatusRequest'
      responses:
        '200':
          description: Terrain mis a jour
          content:
            application/json:
              schema:
                $ref: './tests/schemas/terrain.schema.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/terrains/{terrain_id}/reservations:
    parameters:
      - $ref: '#/components/parameters/TerrainIdParam'
    post:
      tags: [Reservations]
      summary: Creer une reservation de terrain
      operationId: createTerrainReservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerrainReservationRequest'
      responses:
        '201':
          description: Reservation creee
          content:
            application/json:
              schema:
                $ref: './tests/schemas/terrain-reservation.schema.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/terrains/{terrain_id}/reservations/{reservation_id}/status:
    parameters:
      - $ref: '#/components/parameters/TerrainIdParam'
      - $ref: '#/components/parameters/ReservationIdParam'
    patch:
      tags: [Reservations]
      summary: Changer le statut d'une reservation
      operationId: updateTerrainReservationStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservationStatusRequest'
      responses:
        '200':
          description: Reservation mise a jour
          content:
            application/json:
              schema:
                $ref: './tests/schemas/terrain-reservation.schema.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    TerrainIdParam:
      name: terrain_id
      in: path
      required: true
      schema:
        $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
    ReservationIdParam:
      name: reservation_id
      in: path
      required: true
      schema:
        $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'

  responses:
    BadRequest:
      description: Requete invalide
      content:
        application/json:
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'
    Conflict:
      description: Regle metier violee
      content:
        application/json:
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'

  schemas:
    CreateTerrainRequest:
      type: object
      properties:
        name:
          $ref: './tests/schemas/terrain-name.schema.json'
        status_id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      required:
        - name
        - status_id
      additionalProperties: false

    UpdateTerrainStatusRequest:
      type: object
      properties:
        status_id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      required:
        - status_id
      additionalProperties: false

    CreateTerrainReservationRequest:
      type: object
      properties:
        status_id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        start_at:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
        end_at:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
      required:
        - status_id
        - start_at
        - end_at
      additionalProperties: false

    UpdateReservationStatusRequest:
      type: object
      properties:
        status_id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      required:
        - status_id
      additionalProperties: false

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY

security:
  - ApiKeyAuth: []
