openapi: 3.0.3
info:
  title: Field Management API
  version: 1.0.0
  description: API contract pour la gestion des terrains, disponibilites et reservations de five.
servers:
  - url: https://api.example.org
    description: Base URL (remplacer selon environnement)

tags:
  - name: Fields
    description: Gestion du catalogue des terrains
  - name: Reservations
    description: Gestion des reservations des terrains

paths:
  /fields:
    post:
      tags: [Fields]
      summary: Creer un terrain
      operationId: createField
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldRequest'
      responses:
        '201':
          description: Terrain cree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFieldResponse'
        '400':
          description: Requete invalide
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'

    get:
      tags: [Fields]
      summary: Lister les terrains
      operationId: listFields
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/FieldStatus'
        - name: surface
          in: query
          schema:
            type: string
            enum: [synthetic_turf, parquet, concrete, hybrid_turf]
      responses:
        '200':
          description: Liste des terrains
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldListResponse'

  /fields/{fieldId}:
    get:
      tags: [Fields]
      summary: Recuperer un terrain
      operationId: getField
      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      responses:
        '200':
          description: Detail du terrain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Field'
        '404':
          description: Terrain non trouve
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'

  /fields/{fieldId}/status:
    patch:
      tags: [Fields]
      summary: Mettre a jour le statut d'un terrain
      operationId: updateFieldStatus
      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldStatusRequest'
      responses:
        '200':
          description: Statut mis a jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Field'
        '400':
          description: Requete invalide
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Terrain non trouve
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'

  /fields/{fieldId}/availability:
    get:
      tags: [Reservations]
      summary: Obtenir la disponibilite d'un terrain sur une periode
      operationId: getFieldAvailability
      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        - name: from
          in: query
          required: true
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
        - name: to
          in: query
          required: true
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
      responses:
        '200':
          description: Disponibilite du terrain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '404':
          description: Terrain non trouve
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'

  /fields/{fieldId}/reservations:
    post:
      tags: [Reservations]
      summary: Reserver un terrain pour un match
      operationId: createFieldReservation
      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '201':
          description: Reservation creee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '400':
          description: Requete invalide
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Terrain non trouve
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Creneau indisponible
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'

  /fields/{fieldId}/reservations/{reservationId}:
    delete:
      tags: [Reservations]
      summary: Liberer une reservation terrain
      operationId: releaseFieldReservation
      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        - name: reservationId
          in: path
          required: true
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      responses:
        '204':
          description: Reservation liberee
        '404':
          description: Reservation non trouvee
          content:
            application/json:
              schema:
                $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'

components:
  schemas:
    FieldStatus:
      type: string
      enum: [active, maintenance, unavailable]

    CreateFieldRequest:
      type: object
      properties:
        name:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/NonEmptyString'
        venueName:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/NonEmptyString'
        address:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/NonEmptyString'
        dimensions:
          $ref: './tests/schemas/field-dimensions.schema.json'
        surface:
          $ref: './tests/schemas/field-surface.schema.json'
      required: [name, venueName, address, dimensions, surface]

    CreateFieldResponse:
      type: object
      properties:
        id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        name:
          type: string
        status:
          $ref: '#/components/schemas/FieldStatus'
      required: [id, name, status]

    Field:
      type: object
      properties:
        id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        name:
          type: string
        venueName:
          type: string
        address:
          type: string
        dimensions:
          $ref: './tests/schemas/field-dimensions.schema.json'
        surface:
          $ref: './tests/schemas/field-surface.schema.json'
        status:
          $ref: '#/components/schemas/FieldStatus'
        createdAt:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
        updatedAt:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
      required:
        - id
        - name
        - venueName
        - address
        - dimensions
        - surface
        - status
        - createdAt
        - updatedAt

    FieldListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Field'
      required: [items]

    UpdateFieldStatusRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/FieldStatus'
        reason:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/NonEmptyString'
      required: [status]

    CreateReservationRequest:
      type: object
      properties:
        matchId:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        slot:
          $ref: './tests/schemas/time-slot.schema.json'
        requestedByService:
          type: string
          enum: [group-02-manage-match, group-03-record-match]
      required: [matchId, slot, requestedByService]

    Reservation:
      type: object
      properties:
        reservationId:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        fieldId:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        matchId:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        slot:
          $ref: './tests/schemas/time-slot.schema.json'
        status:
          type: string
          enum: [reserved, released]
        createdAt:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
      required: [reservationId, fieldId, matchId, slot, status, createdAt]

    AvailabilityResponse:
      type: object
      properties:
        fieldId:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        from:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
        to:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/Timestamp'
        isReservable:
          type: boolean
        busySlots:
          type: array
          items:
            $ref: './tests/schemas/time-slot.schema.json'
      required: [fieldId, from, to, isReservable, busySlots]

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY

security:
  - ApiKeyAuth: []
