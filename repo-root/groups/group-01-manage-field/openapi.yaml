openapi: 3.0.3
info:
  title: Field Management API
  version: 1.0.0
  description: HTTP contract for fields, field statuses, and field slot occupancy.
servers:
  - url: https://api.example.org
    description: Base URL

tags:
  - name: Reference Data
  - name: Fields
  - name: Reservations

paths:
  /v1/field-statuses:
    get:
      tags: [Reference Data]
      summary: List field statuses
      operationId: listFieldStatuses
      responses:
        '200':
          description: Field status list
          content:
            application/json:
              schema:
                $ref: './tests/schemas/field-status-list.schema.json'

  /v1/reservation-statuses:
    get:
      tags: [Reference Data]
      summary: List reservation statuses
      operationId: listReservationStatuses
      responses:
        '200':
          description: Reservation status list
          content:
            application/json:
              schema:
                $ref: './tests/schemas/reservation-status-list.schema.json'

  /v1/fields:
    post:
      tags: [Fields]
      summary: Create a field
      operationId: createField
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldRequest'
      responses:
        '201':
          description: Field created
          content:
            application/json:
              schema:
                $ref: './tests/schemas/field.schema.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/fields/{field_id}:
    parameters:
      - $ref: '#/components/parameters/FieldIdParam'
    get:
      tags: [Fields]
      summary: Get a field
      operationId: getField
      responses:
        '200':
          description: Field
          content:
            application/json:
              schema:
                $ref: './tests/schemas/field.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/fields/{field_id}/status:
    parameters:
      - $ref: '#/components/parameters/FieldIdParam'
    patch:
      tags: [Fields]
      summary: Change a field status
      operationId: updateFieldStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldStatusRequest'
      responses:
        '200':
          description: Updated field
          content:
            application/json:
              schema:
                $ref: './tests/schemas/field.schema.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/fields/{field_id}/reservations:
    parameters:
      - $ref: '#/components/parameters/FieldIdParam'
    post:
      tags: [Reservations]
      summary: Reserve a field slot
      description: Primary synchronous contract used by Match Management to lock a field slot.
      operationId: createFieldReservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldReservationRequest'
      responses:
        '201':
          description: Field slot reserved
          content:
            application/json:
              schema:
                $ref: './tests/schemas/field-reservation.schema.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/fields/{field_id}/reservations/{reservation_id}/status:
    parameters:
      - $ref: '#/components/parameters/FieldIdParam'
      - $ref: '#/components/parameters/ReservationIdParam'
    patch:
      tags: [Reservations]
      summary: Change a reservation status
      description: Update the status of an existing field slot reservation.
      operationId: updateFieldReservationStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservationStatusRequest'
      responses:
        '200':
          description: Updated field slot reservation
          content:
            application/json:
              schema:
                $ref: './tests/schemas/field-reservation.schema.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    FieldIdParam:
      name: field_id
      in: path
      required: true
      schema:
        $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
    ReservationIdParam:
      name: reservation_id
      in: path
      required: true
      schema:
        $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'
    Conflict:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '../../openapi/common/schemas.yaml#/components/schemas/ErrorResponse'

  schemas:
    CreateFieldRequest:
      type: object
      properties:
        name:
          $ref: './tests/schemas/field-name.schema.json#/properties/name'
        status_id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      required:
        - name
        - status_id
      additionalProperties: false

    UpdateFieldStatusRequest:
      type: object
      properties:
        status_id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      required:
        - status_id
      additionalProperties: false

    CreateFieldReservationRequest:
      type: object
      properties:
        status_id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
        start_at:
          $ref: './tests/schemas/time-slot.schema.json#/properties/start_at'
        end_at:
          $ref: './tests/schemas/time-slot.schema.json#/properties/end_at'
      required:
        - status_id
        - start_at
        - end_at
      additionalProperties: false

    UpdateReservationStatusRequest:
      type: object
      properties:
        status_id:
          $ref: '../../openapi/common/schemas.yaml#/components/schemas/UUID'
      required:
        - status_id
      additionalProperties: false

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY

security:
  - ApiKeyAuth: []
